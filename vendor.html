<!DOCTYPE html>
<html>
<head>
  <title>Vendor Profile | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: #EBFCFF;
      border-bottom: 1px solid #d9eef2;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #1A0C6A;
    }

    .profile-hero {
      max-width: 1100px;
      margin: 50px auto 30px;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: center;
    }

    .profile-hero img {
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
    }

    .profile-info {
      flex: 1;
      min-width: 280px;
    }

    .profile-info h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    .profile-info p {
      font-size: 18px;
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid #1A0C6A;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .cta-button {
      display: inline-block;
      padding: 12px 20px;
      background-color: #1A0C6A;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 15px;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .section h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .details-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .detail-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      min-width: 200px;
    }

    .footer {
      text-align: center;
      padding: 30px;
      background: #1A0C6A;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">VendorVibe</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="vendors.html">Find Vendors</a>
      <a href="signup.html">For Vendors</a>
    </div>
  </nav>

  <section class="profile-hero">
    <img id="vendorImage">

    <div class="profile-info">
      <div class="tag" id="vendorTag"></div>
      <h1 id="vendorName"></h1>
      <p id="vendorDescription"></p>
      <a href="signup.html" class="cta-button">Contact This Vendor</a>
    </div>
  </section>

  <section class="section">
    <h2>About</h2>
    <p id="vendorAbout"></p>
  </section>

  <section class="section">
    <h2>Service Details</h2>

    <div class="details-grid">
      <div class="detail-card">
        <h3>Event Types</h3>
        <p id="vendorEvents"></p>
      </div>

      <div class="detail-card">
        <h3>Services</h3>
        <p id="vendorServices"></p>
      </div>

      <div class="detail-card">
        <h3>Location</h3>
        <p>Ontario, Canada</p>
      </div>
    </div>
  </section>

  <div class="footer">
    <p>VendorVibe © 2026</p>
  </div>

<script>
const vendors = {
  bluebird: {
    name: "Bluebird Events",
    tag: "Event Planning",
    image: "https://images.unsplash.com/photo-1519167758481-83f550bb49b3",
    description: "Full-service planning for weddings and private events.",
    about: "Bluebird Events specializes in elegant, curated experiences for weddings and private celebrations.",
    events: "Weddings, private events, luxury celebrations",
    services: "Full planning, coordination, vendor management"
  },

  north: {
    name: "North Stage Collective",
    tag: "Production",
    image: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30",
    description: "Production support for festivals and large events.",
    about: "North Stage Collective supports large-scale events with logistics and production expertise.",
    events: "Festivals, concerts, public events",
    services: "Stage production, logistics, coordination"
  },

  golden: {
    name: "Golden Hour Media",
    tag: "Photography",
    image: "https://images.unsplash.com/photo-1520854221256-17451cc331bf",
    description: "Photography for weddings, brands, and events.",
    about: "Golden Hour Media captures emotional, natural event photography.",
    events: "Weddings, corporate events, branding",
    services: "Photography, editing, galleries"
  },

  elevate: {
    name: "Elevate Corporate",
    tag: "Corporate Events",
    image: "https://images.unsplash.com/photo-1511578314322-379afb476865",
    description: "Professional corporate event planning.",
    about: "Elevate Corporate creates polished business events.",
    events: "Conferences, networking, corporate",
    services: "Planning, logistics, coordination"
  },

  harvest: {
    name: "Harvest Table Catering",
    tag: "Catering",
    image: "https://images.unsplash.com/photo-1555244162-803834f70033",
    description: "Beautiful menus for events.",
    about: "Harvest Table delivers elevated catering experiences.",
    events: "Weddings, dinners, corporate",
    services: "Catering, menu design"
  },

  pulse: {
    name: "Pulse Entertainment",
    tag: "Entertainment",
    image: "https://images.unsplash.com/photo-1505236858219-8359eb29e329",
    description: "DJs and live entertainment.",
    about: "Pulse Entertainment brings energy to every event.",
    events: "Parties, weddings, festivals",
    services: "DJ, music, entertainment"
  }
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const v = vendors[id];

if (v) {
  document.getElementById("vendorName").textContent = v.name;
  document.getElementById("vendorTag").textContent = v.tag;
  document.getElementById("vendorImage").src = v.image;
  document.getElementById("vendorDescription").textContent = v.description;
  document.getElementById("vendorAbout").textContent = v.about;
  document.getElementById("vendorEvents").textContent = v.events;
  document.getElementById("vendorServices").textContent = v.services;
}
</script>

</body>
</html>
