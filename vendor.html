<!DOCTYPE html>
<html>
<head>
  <title>Vendor Profile | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: #EBFCFF;
      border-bottom: 1px solid #d9eef2;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #1A0C6A;
    }

    .profile-hero {
      max-width: 1100px;
      margin: 50px auto 30px;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: center;
    }

    .profile-hero img {
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .profile-info {
      flex: 1;
      min-width: 280px;
    }

    .profile-info h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid #1A0C6A;
      border-radius: 20px;
      margin-bottom: 10px;
      background-color: white;
    }

    .premium-label {
      display: none;
      margin-left: 10px;
      padding: 6px 12px;
      background-color: #1A0C6A;
      color: white;
      border-radius: 20px;
      font-size: 13px;
    }

    .cta-button {
      display: inline-block;
      padding: 12px 20px;
      background-color: #1A0C6A;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 15px;
    }

    .vendor-links a {
      display: inline-block;
      margin-right: 10px;
      margin-top: 10px;
      padding: 6px 10px;
      border: 1px solid #1A0C6A;
      border-radius: 20px;
      text-decoration: none;
      color: #1A0C6A;
    }

    .vendor-links a:hover {
      background-color: #1A0C6A;
      color: white;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .details-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .detail-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      min-width: 200px;
    }

    .gallery-grid {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .gallery-grid img {
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 14px;
      cursor: pointer;
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 85%;
      max-height: 85%;
      border-radius: 12px;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }

    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 55px;
      color: white;
      cursor: pointer;
      user-select: none;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
    }

    .lightbox-arrow:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .lightbox-prev {
      left: 30px;
    }

    .lightbox-next {
      right: 30px;
    }

    .lightbox-counter {
      position: absolute;
      bottom: 25px;
      color: white;
      font-size: 16px;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">VendorVibe</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="vendors.html">Find Vendors</a>
      <a href="signup.html">For Vendors</a>
    </div>
  </nav>

  <section class="profile-hero">
    <img id="vendorImage">

    <div class="profile-info">
      <div>
        <span class="tag" id="vendorTag"></span>
        <span class="premium-label" id="premiumLabel">Premium Vendor</span>
      </div>

      <h1 id="vendorName"></h1>
      <p id="vendorDescription"></p>

      <div id="vendorLinks"></div>

      <a href="signup.html" class="cta-button">Contact This Vendor</a>
    </div>
  </section>

  <section class="section">
    <h2>About</h2>
    <p id="vendorAbout"></p>
  </section>

  <section class="section">
    <h2>Service Details</h2>

    <div class="details-grid">
      <div class="detail-card">
        <h3>Event Types</h3>
        <p id="vendorEvents"></p>
      </div>

      <div class="detail-card">
        <h3>Services</h3>
        <p id="vendorServices"></p>
      </div>

      <div class="detail-card">
        <h3>Location</h3>
        <p id="vendorLocation"></p>
      </div>
    </div>
  </section>

  <section class="section" id="gallerySection" style="display:none;">
    <h2>Photo Gallery</h2>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <span class="lightbox-arrow lightbox-prev" id="lightboxPrev">&#10094;</span>
    <img id="lightboxImage">
    <span class="lightbox-arrow lightbox-next" id="lightboxNext">&#10095;</span>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://zvoarlanqjlezqzmgwhe.supabase.co",
      "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
    );

    let galleryImages = [];
    let currentImageIndex = 0;

    function createVendorId(name) {
      return name.toLowerCase().replaceAll(" ", "-");
    }

    function updateLightboxImage() {
      const imageUrl = galleryImages[currentImageIndex];
      document.getElementById("lightboxImage").src = imageUrl;
      document.getElementById("lightboxCounter").textContent =
        `${currentImageIndex + 1} / ${galleryImages.length}`;
    }

    function openLightbox(index) {
      currentImageIndex = index;
      document.getElementById("lightbox").style.display = "flex";
      updateLightboxImage();
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }

    function showNextImage() {
      if (galleryImages.length === 0) return;
      currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
      updateLightboxImage();
    }

    function showPreviousImage() {
      if (galleryImages.length === 0) return;
      currentImageIndex =
        (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
      updateLightboxImage();
    }

    document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
    document.getElementById("lightboxNext").addEventListener("click", showNextImage);
    document.getElementById("lightboxPrev").addEventListener("click", showPreviousImage);

    document.getElementById("lightbox").addEventListener("click", function(event) {
      if (event.target.id === "lightbox") {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", function(event) {
      const lightboxOpen = document.getElementById("lightbox").style.display === "flex";

      if (!lightboxOpen) return;

      if (event.key === "ArrowRight") {
        showNextImage();
      }

      if (event.key === "ArrowLeft") {
        showPreviousImage();
      }

      if (event.key === "Escape") {
        closeLightbox();
      }
    });

    async function loadVendor() {
      const id = new URLSearchParams(window.location.search).get("id");

      const { data, error } = await supabaseClient
        .from("vendors")
        .select("*")
        .eq("status", "approved");

      if (error) {
        console.log("Vendor load error:", error);
        return;
      }

      const vendor = data.find(v => createVendorId(v.name) === id);

      if (!vendor) return;

      document.getElementById("vendorName").textContent = vendor.name;
      document.getElementById("vendorTag").textContent = vendor.category;
      document.getElementById("vendorImage").src = vendor.image || "";
      document.getElementById("vendorDescription").textContent = vendor.description || "";
      document.getElementById("vendorAbout").textContent = vendor.description || "";
      document.getElementById("vendorEvents").textContent = vendor.category || "";
      document.getElementById("vendorServices").textContent = "Full service";
      document.getElementById("vendorLocation").textContent = vendor.city || "Ontario, Canada";

      if (vendor.is_premium) {
        document.getElementById("premiumLabel").style.display = "inline-block";

        let links = "";

        if (vendor.website) links += `<a href="${vendor.website}" target="_blank">Website</a>`;
        if (vendor.instagram) links += `<a href="${vendor.instagram}" target="_blank">Instagram</a>`;
        if (vendor.facebook) links += `<a href="${vendor.facebook}" target="_blank">Facebook</a>`;

        if (links) {
          document.getElementById("vendorLinks").innerHTML = `<div class="vendor-links">${links}</div>`;
        }

        const { data: images, error: imageError } = await supabaseClient
          .from("vendor_gallery")
          .select("*")
          .eq("vendor_id", vendor.id)
          .order("position", { ascending: true })
          .order("created_at", { ascending: true });

        if (imageError) {
          console.log("Gallery load error:", imageError);
          return;
        }

        if (images && images.length > 0) {
          document.getElementById("gallerySection").style.display = "block";
          const galleryGrid = document.getElementById("galleryGrid");
          galleryGrid.innerHTML = "";

          galleryImages = images.map(img => img.image_url);

          images.forEach((img, index) => {
            galleryGrid.innerHTML += `
              <img src="${img.image_url}" onclick="openLightbox(${index})">
            `;
          });
        }
      }
    }

    loadVendor();
  </script>

</body>
</html>
