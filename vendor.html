<!DOCTYPE html>
<html>
<head>
  <title>Vendor Profile | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: #EBFCFF;
      border-bottom: 1px solid #d9eef2;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #1A0C6A;
    }

    .profile-hero {
      max-width: 1100px;
      margin: 50px auto 30px;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: center;
    }

    .profile-hero img {
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .profile-info {
      flex: 1;
      min-width: 280px;
    }

    .profile-info h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    .profile-info p {
      font-size: 18px;
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid #1A0C6A;
      border-radius: 20px;
      margin-bottom: 20px;
      background-color: white;
    }

    .cta-button {
      display: inline-block;
      padding: 12px 20px;
      background-color: #1A0C6A;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 15px;
      font-weight: bold;
    }

    .vendor-links a {
      display: inline-block;
      margin-right: 12px;
      margin-top: 10px;
      padding: 8px 12px;
      border: 1px solid #1A0C6A;
      border-radius: 20px;
      text-decoration: none;
      color: #1A0C6A;
      font-size: 14px;
    }

    .vendor-links a:hover {
      background-color: #1A0C6A;
      color: white;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .section h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .details-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .detail-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      min-width: 200px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    .footer {
      text-align: center;
      padding: 30px;
      background: #1A0C6A;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">VendorVibe</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="vendors.html">Find Vendors</a>
      <a href="signup.html">For Vendors</a>
    </div>
  </nav>

  <section class="profile-hero">
    <img id="vendorImage" alt="Vendor image">

    <div class="profile-info">
      <div class="tag" id="vendorTag"></div>
      <h1 id="vendorName"></h1>
      <p id="vendorDescription"></p>

      <div id="vendorLinks" style="margin-top: 15px;"></div>

      <a href="signup.html" class="cta-button">Contact This Vendor</a>
    </div>
  </section>

  <section class="section">
    <h2>About</h2>
    <p id="vendorAbout"></p>
  </section>

  <section class="section">
    <h2>Service Details</h2>

    <div class="details-grid">
      <div class="detail-card">
        <h3>Event Types</h3>
        <p id="vendorEvents"></p>
      </div>

      <div class="detail-card">
        <h3>Services</h3>
        <p id="vendorServices"></p>
      </div>

      <div class="detail-card">
        <h3>Location</h3>
        <p>Ontario, Canada</p>
      </div>
    </div>
  </section>

  <div class="footer">
    <p>VendorVibe © 2026</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://zvoarlanqjlezqzmgwhe.supabase.co",
      "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
    );

    function createVendorId(name) {
      return name.toLowerCase().replaceAll(" ", "-");
    }

    async function loadVendor() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const { data, error } = await supabaseClient
        .from("vendors")
        .select("*")
        .eq("status", "approved");

      if (error) {
        console.log("Supabase error:", error);
        return;
      }

      const vendor = data.find(v => createVendorId(v.name) === id);

      if (vendor) {
        document.getElementById("vendorName").textContent = vendor.name;
        document.getElementById("vendorTag").textContent = vendor.category;
        document.getElementById("vendorImage").src = vendor.image || "https://images.unsplash.com/photo-1511795409834-ef04bbd61622";
        document.getElementById("vendorDescription").textContent = vendor.description;
        document.getElementById("vendorAbout").textContent = vendor.description;
        document.getElementById("vendorEvents").textContent = vendor.category;
        document.getElementById("vendorServices").textContent = "Full-service vendor support";

        const linksContainer = document.getElementById("vendorLinks");
        linksContainer.innerHTML = "";

        if (vendor.is_premium) {
          let linksHTML = '<div class="vendor-links">';

          if (vendor.website) {
            linksHTML += `<a href="${vendor.website}" target="_blank">Website</a>`;
          }

          if (vendor.instagram) {
            linksHTML += `<a href="${vendor.instagram}" target="_blank">Instagram</a>`;
          }

          if (vendor.facebook) {
            linksHTML += `<a href="${vendor.facebook}" target="_blank">Facebook</a>`;
          }

          linksHTML += '</div>';
          linksContainer.innerHTML = linksHTML;
        }
      }
    }

    loadVendor();
  </script>

</body>
</html>
