<!DOCTYPE html>
<html>
<head>
  <title>Find Vendors | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: #EBFCFF;
      border-bottom: 1px solid #d9eef2;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #1A0C6A;
    }

    .page-header {
      text-align: center;
      padding: 60px 20px 20px;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      padding: 30px 20px 10px;
    }

    .filter-bar input,
    .filter-bar select {
      padding: 14px;
      font-size: 16px;
      border: 1px solid #b9d8de;
      border-radius: 8px;
      min-width: 240px;
    }

    .vendor-grid {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      padding: 30px 20px 80px;
    }

    .vendor-link {
      text-decoration: none;
      color: inherit;
      display: flex;
      width: 300px;
    }

    .vendor-card {
      background-color: white;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      text-align: left;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .vendor-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.12);
    }

    .vendor-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background-color: #EBFCFF;
    }

    .vendor-card-content {
      padding: 22px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .vendor-card h2 {
      font-size: 24px;
      margin: 0 0 10px;
    }

    .vendor-card p {
      font-size: 16px;
      line-height: 1.5;
    }

    .tag {
      margin-top: auto;
      padding: 8px 12px;
      background-color: #EBFCFF;
      border: 1px solid #1A0C6A;
      border-radius: 20px;
      font-size: 14px;
      display: inline-block;
    }

    .footer {
      text-align: center;
      padding: 30px 20px;
      background-color: #1A0C6A;
      color: white;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">VendorVibe</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="vendors.html">Find Vendors</a>
      <a href="signup.html">For Vendors</a>
    </div>
  </nav>

  <section class="page-header">
    <h1>Find Vendors</h1>
    <p>Browse approved vendors for weddings, corporate events, festivals, and unforgettable experiences.</p>
  </section>

  <section class="filter-bar">
    <input type="text" id="searchInput" placeholder="Search vendors or services">
    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="Event Planning">Event Planning</option>
      <option value="Photography">Photography</option>
      <option value="Catering">Catering</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Production">Production</option>
      <option value="Corporate Events">Corporate Events</option>
    </select>
  </section>

  <section class="vendor-grid" id="vendorGrid"></section>

  <div class="footer">
    <p>VendorVibe © 2026</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://zvoarlanqjlezqzmgwhe.supabase.co",
      "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
    );

    const vendorGrid = document.getElementById("vendorGrid");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");

    let allVendors = [];

    function createVendorId(name) {
      return name.toLowerCase().replaceAll(" ", "-");
    }

    function renderVendors(vendors) {
      vendorGrid.innerHTML = "";

      vendors.forEach(vendor => {
        const vendorId = createVendorId(vendor.name);

        const card = `
          <a href="vendor.html?id=${vendorId}" class="vendor-link">
            <div class="vendor-card">
              <img src="${vendor.image || 'https://images.unsplash.com/photo-1511795409834-ef04bbd61622'}" alt="${vendor.name}">
              <div class="vendor-card-content">
                <h2>${vendor.name}</h2>
                <p>${vendor.description || ''}</p>
                <div class="tag">${vendor.category || 'Vendor'}</div>
              </div>
            </div>
          </a>
        `;

        vendorGrid.innerHTML += card;
      });
    }

    function filterVendors() {
      const searchText = searchInput.value.toLowerCase();
      const selectedCategory = categoryFilter.value;

      const filtered = allVendors.filter(vendor => {
        const matchesSearch =
          vendor.name.toLowerCase().includes(searchText) ||
          vendor.description.toLowerCase().includes(searchText) ||
          vendor.category.toLowerCase().includes(searchText);

        const matchesCategory =
          selectedCategory === "all" || vendor.category === selectedCategory;

        return matchesSearch && matchesCategory;
      });

      renderVendors(filtered);
    }

    async function loadVendors() {
      const { data, error } = await supabaseClient
        .from("vendors")
        .select("*")
        .eq("status", "approved")
        .order("created_at", { ascending: false });

      if (error) {
        vendorGrid.innerHTML = "<p>Something went wrong loading vendors.</p>";
        console.log("Supabase load error:", error);
        return;
      }

      allVendors = data;
      renderVendors(allVendors);
    }

    searchInput.addEventListener("input", filterVendors);
    categoryFilter.addEventListener("change", filterVendors);

    loadVendors();
  </script>

</body>
</html>
