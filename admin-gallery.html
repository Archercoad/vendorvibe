<!DOCTYPE html>
<html>
<head>
  <title>Admin Gallery Upload | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      background: white;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    label {
      display: block;
      margin-top: 20px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #b9d8de;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background-color: #1A0C6A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
    }

    .gallery-preview {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 25px;
    }

    .gallery-item {
      width: 180px;
      background: #EBFCFF;
      padding: 10px;
      border-radius: 12px;
      text-align: center;
    }

    .gallery-item img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }

    .delete-button {
      background-color: #b00020;
      margin-top: 10px;
      width: 100%;
    }

    a {
      color: #1A0C6A;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Vendor Gallery Upload</h1>
    <p>Upload or delete gallery photos for premium vendors.</p>

    <label for="vendorSelect">Vendor</label>
    <select id="vendorSelect">
      <option value="">Loading vendors...</option>
    </select>

    <label for="photoInput">Upload Photos</label>
    <input type="file" id="photoInput" accept="image/*" multiple>

    <button id="uploadButton">Upload Images</button>

    <p class="message" id="message"></p>

    <h2>Current Gallery</h2>
    <div class="gallery-preview" id="galleryPreview"></div>

    <p><a href="vendors.html">Back to Vendors</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://zvoarlanqjlezqzmgwhe.supabase.co",
      "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
    );

    const vendorSelect = document.getElementById("vendorSelect");
    const photoInput = document.getElementById("photoInput");
    const uploadButton = document.getElementById("uploadButton");
    const message = document.getElementById("message");
    const galleryPreview = document.getElementById("galleryPreview");

    async function loadVendors() {
      const { data, error } = await supabaseClient
        .from("vendors")
        .select("id, name, is_premium")
        .eq("status", "approved")
        .order("name", { ascending: true });

      if (error) {
        message.textContent = "Could not load vendors.";
        console.log(error);
        return;
      }

      vendorSelect.innerHTML = '<option value="">Select a vendor</option>';

      data.forEach(vendor => {
        const premiumLabel = vendor.is_premium ? " — Premium" : " — Not Premium";
        vendorSelect.innerHTML += `
          <option value="${vendor.id}" data-premium="${vendor.is_premium}">
            ${vendor.name}${premiumLabel}
          </option>
        `;
      });
    }

    async function loadGallery(vendorId) {
      galleryPreview.innerHTML = "";

      if (!vendorId) return;

      const { data, error } = await supabaseClient
        .from("vendor_gallery")
        .select("*")
        .eq("vendor_id", vendorId)
        .order("created_at", { ascending: false });

      if (error) {
        message.textContent = "Could not load gallery.";
        console.log(error);
        return;
      }

      if (!data || data.length === 0) {
        galleryPreview.innerHTML = "<p>No gallery images yet.</p>";
        return;
      }

      data.forEach(image => {
        galleryPreview.innerHTML += `
          <div class="gallery-item">
            <img src="${image.image_url}" alt="Gallery image">
            <button class="delete-button" onclick="deleteImage('${image.id}')">Delete</button>
          </div>
        `;
      });
    }

    async function deleteImage(imageId) {
      const confirmDelete = confirm("Delete this image from the gallery?");
      if (!confirmDelete) return;

      const { error } = await supabaseClient
        .from("vendor_gallery")
        .delete()
        .eq("id", imageId);

      if (error) {
        message.textContent = "Delete failed.";
        console.log(error);
        return;
      }

      message.textContent = "Image deleted from gallery.";
      loadGallery(vendorSelect.value);
    }

    vendorSelect.addEventListener("change", function() {
      message.textContent = "";
      loadGallery(vendorSelect.value);
    });

    uploadButton.addEventListener("click", async function() {
      message.textContent = "";

      const vendorId = vendorSelect.value;
      const selectedOption = vendorSelect.options[vendorSelect.selectedIndex];
      const isPremium = selectedOption?.dataset?.premium === "true";
      const files = photoInput.files;

      if (!vendorId) {
        message.textContent = "Please select a vendor.";
        return;
      }

      if (!isPremium) {
        message.textContent = "Only premium vendors can have gallery uploads.";
        return;
      }

      if (!files.length) {
        message.textContent = "Please select at least one photo.";
        return;
      }

      message.textContent = "Uploading...";

      for (let file of files) {
        const fileExt = file.name.split(".").pop();
        const fileName = `${vendorId}-${Date.now()}-${Math.random()}.${fileExt}`;
        const filePath = `${vendorId}/${fileName}`;

        const { error: uploadError } = await supabaseClient
          .storage
          .from("vendor-gallery")
          .upload(filePath, file);

        if (uploadError) {
          message.textContent = "Upload failed.";
          console.log(uploadError);
          return;
        }

        const { data: publicUrlData } = supabaseClient
          .storage
          .from("vendor-gallery")
          .getPublicUrl(filePath);

        const publicUrl = publicUrlData.publicUrl;

        const { error: insertError } = await supabaseClient
          .from("vendor_gallery")
          .insert([
            {
              vendor_id: vendorId,
              image_url: publicUrl
            }
          ]);

        if (insertError) {
          message.textContent = "Image save failed.";
          console.log(insertError);
          return;
        }
      }

      message.textContent = "All images uploaded successfully!";
      photoInput.value = "";
      loadGallery(vendorId);
    });

    loadVendors();
  </script>

</body>
</html>
