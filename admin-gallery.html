<!DOCTYPE html>
<html>
<head>
  <title>Admin Gallery Upload | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      background: white;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    label {
      display: block;
      margin-top: 20px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #b9d8de;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      background-color: #1A0C6A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
    }

    .drop-zone {
      margin-top: 12px;
      padding: 35px;
      border: 2px dashed #1A0C6A;
      border-radius: 14px;
      text-align: center;
      background-color: #EBFCFF;
      cursor: pointer;
    }

    .drop-zone.dragover {
      background-color: white;
      border-style: solid;
    }

    .file-list {
      margin-top: 12px;
      font-size: 14px;
    }

    .gallery-preview {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 25px;
    }

    .gallery-item {
      width: 180px;
      background: #EBFCFF;
      padding: 10px;
      border-radius: 12px;
      text-align: center;
    }

    .gallery-item img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }

    .delete-button {
      background-color: #b00020;
      width: 100%;
    }

    .move-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .move-buttons button {
      flex: 1;
    }

    a {
      color: #1A0C6A;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Vendor Gallery Upload</h1>
    <p>Upload, delete, and reorder gallery photos for premium vendors.</p>

    <label for="vendorSelect">Vendor</label>
    <select id="vendorSelect">
      <option value="">Loading vendors...</option>
    </select>

    <label>Upload Photos</label>

    <div class="drop-zone" id="dropZone">
      <p><strong>Drag & drop photos here</strong></p>
      <p>or click to choose files</p>
    </div>

    <input type="file" id="photoInput" accept="image/*" multiple style="display: none;">

    <div class="file-list" id="fileList">No files selected.</div>

    <button id="uploadButton">Upload Images</button>

    <p class="message" id="message"></p>

    <h2>Current Gallery</h2>
    <div class="gallery-preview" id="galleryPreview"></div>

    <p><a href="vendors.html">Back to Vendors</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://zvoarlanqjlezqzmgwhe.supabase.co",
      "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
    );

    const vendorSelect = document.getElementById("vendorSelect");
    const photoInput = document.getElementById("photoInput");
    const uploadButton = document.getElementById("uploadButton");
    const message = document.getElementById("message");
    const galleryPreview = document.getElementById("galleryPreview");
    const dropZone = document.getElementById("dropZone");
    const fileList = document.getElementById("fileList");

    let selectedFiles = [];
    let currentGallery = [];

    function updateFileList() {
      if (selectedFiles.length === 0) {
        fileList.textContent = "No files selected.";
        return;
      }

      fileList.innerHTML = selectedFiles
        .map(file => `• ${file.name}`)
        .join("<br>");
    }

    dropZone.addEventListener("click", function() {
      photoInput.click();
    });

    photoInput.addEventListener("change", function() {
      selectedFiles = Array.from(photoInput.files);
      updateFileList();
    });

    dropZone.addEventListener("dragover", function(event) {
      event.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", function() {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", function(event) {
      event.preventDefault();
      dropZone.classList.remove("dragover");

      selectedFiles = Array.from(event.dataTransfer.files).filter(file =>
        file.type.startsWith("image/")
      );

      updateFileList();
    });

    async function loadVendors() {
      const { data, error } = await supabaseClient
        .from("vendors")
        .select("id, name, is_premium")
        .eq("status", "approved")
        .order("name", { ascending: true });

      if (error) {
        message.textContent = "Could not load vendors.";
        console.log(error);
        return;
      }

      vendorSelect.innerHTML = '<option value="">Select a vendor</option>';

      data.forEach(vendor => {
        const premiumLabel = vendor.is_premium ? " — Premium" : " — Not Premium";
        vendorSelect.innerHTML += `
          <option value="${vendor.id}" data-premium="${vendor.is_premium}">
            ${vendor.name}${premiumLabel}
          </option>
        `;
      });
    }

    async function loadGallery(vendorId) {
      galleryPreview.innerHTML = "";
      currentGallery = [];

      if (!vendorId) return;

      const { data, error } = await supabaseClient
  .from("vendor_gallery")
  .select("*")
  .eq("vendor_id", vendorId)
  .order("created_at", { ascending: true });

      if (error) {
        message.textContent = "Could not load gallery.";
        console.log(error);
        return;
      }

      if (error) {
  message.textContent = "Could not load gallery: " + error.message;
  console.log(error);
  return;
}

      currentGallery = data;

      data.forEach((image, index) => {
        galleryPreview.innerHTML += `
          <div class="gallery-item">
            <img src="${image.image_url}" alt="Gallery image">

            <div class="move-buttons">
              <button onclick="moveImage(${index}, -1)" ${index === 0 ? "disabled" : ""}>↑</button>
              <button onclick="moveImage(${index}, 1)" ${index === data.length - 1 ? "disabled" : ""}>↓</button>
            </div>

            <button class="delete-button" onclick="deleteImage('${image.id}', '${image.file_path}')">Delete</button>
          </div>
        `;
      });
    }

    async function moveImage(index, direction) {
      const newIndex = index + direction;

      if (newIndex < 0 || newIndex >= currentGallery.length) return;

      const currentImage = currentGallery[index];
      const swapImage = currentGallery[newIndex];

      const currentPosition = currentImage.position ?? index;
      const swapPosition = swapImage.position ?? newIndex;

      const { error: errorOne } = await supabaseClient
        .from("vendor_gallery")
        .update({ position: swapPosition })
        .eq("id", currentImage.id);

      const { error: errorTwo } = await supabaseClient
        .from("vendor_gallery")
        .update({ position: currentPosition })
        .eq("id", swapImage.id);

      if (errorOne || errorTwo) {
        message.textContent = "Reorder failed.";
        console.log(errorOne || errorTwo);
        return;
      }

      message.textContent = "Gallery order updated.";
      loadGallery(vendorSelect.value);
    }

    async function deleteImage(imageId, filePath) {
      const confirmDelete = confirm("Delete this image from the gallery and storage?");
      if (!confirmDelete) return;

      if (!filePath || filePath === "null" || filePath === "undefined") {
        message.textContent = "This image does not have a valid file path saved.";
        return;
      }

      const { error: storageError } = await supabaseClient
        .storage
        .from("vendor-gallery")
        .remove([filePath]);

      if (storageError) {
        message.textContent = "Storage delete failed.";
        console.log(storageError);
        return;
      }

      const { error: dbError } = await supabaseClient
        .from("vendor_gallery")
        .delete()
        .eq("id", imageId);

      if (dbError) {
        message.textContent = "Database delete failed.";
        console.log(dbError);
        return;
      }

      message.textContent = "Image deleted from gallery and storage.";
      loadGallery(vendorSelect.value);
    }

    vendorSelect.addEventListener("change", function() {
      message.textContent = "";
      loadGallery(vendorSelect.value);
    });

    uploadButton.addEventListener("click", async function() {
      message.textContent = "";

      const vendorId = vendorSelect.value;
      const selectedOption = vendorSelect.options[vendorSelect.selectedIndex];
      const isPremium = selectedOption?.dataset?.premium === "true";

      if (!vendorId) {
        message.textContent = "Please select a vendor.";
        return;
      }

      if (!isPremium) {
        message.textContent = "Only premium vendors can have gallery uploads.";
        return;
      }

      if (!selectedFiles.length) {
        message.textContent = "Please select at least one photo.";
        return;
      }

      message.textContent = "Uploading...";

      const { data: existingImages } = await supabaseClient
        .from("vendor_gallery")
        .select("position")
        .eq("vendor_id", vendorId)
        .order("position", { ascending: false })
        .limit(1);

      let nextPosition = existingImages && existingImages.length > 0
        ? (existingImages[0].position || 0) + 1
        : 1;

      for (let file of selectedFiles) {
        const fileExt = file.name.split(".").pop();
        const fileName = `${vendorId}-${Date.now()}-${Math.random()}.${fileExt}`;
        const filePath = `${vendorId}/${fileName}`;

        const { error: uploadError } = await supabaseClient
          .storage
          .from("vendor-gallery")
          .upload(filePath, file);

        if (uploadError) {
          message.textContent = "Upload failed.";
          console.log(uploadError);
          return;
        }

        const { data: publicUrlData } = supabaseClient
          .storage
          .from("vendor-gallery")
          .getPublicUrl(filePath);

        const publicUrl = publicUrlData.publicUrl;

        const { error: insertError } = await supabaseClient
          .from("vendor_gallery")
          .insert([
            {
              vendor_id: vendorId,
              image_url: publicUrl,
              file_path: filePath,
              position: nextPosition
            }
          ]);

        if (insertError) {
          message.textContent = "Image save failed.";
          console.log(insertError);
          return;
        }

        nextPosition++;
      }

      message.textContent = "All images uploaded successfully!";
      selectedFiles = [];
      photoInput.value = "";
      updateFileList();
      loadGallery(vendorId);
    });

    loadVendors();
  </script>

</body>
</html>
