<!DOCTYPE html>
<html>
<head>
  <title>Messages | VendorVibe</title>
  <link rel="stylesheet" href="app.css">
</head>

<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">VendorVibe</div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search conversations...">
    </div>
  </div>

  <nav class="top-nav">
    <a href="vendor-dashboard.html" class="top-nav-item">Dashboard</a>
    <a href="vendors.html" class="top-nav-item">Vendors</a>
    <a href="messages.html" class="top-nav-item">
      Messages
      <span class="nav-badge" id="messageBadge" style="display:none;">0</span>
    </a>
    <a href="#" class="top-nav-item">Notifications</a>
    <a href="vendor-dashboard.html" class="top-nav-item">Profile</a>
    <a href="login.html" class="top-nav-item" id="logoutLink">Logout</a>
  </nav>
</header>

<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Messages</h2>
      <div class="sidebar-search">
        <input type="text" id="sidebarSearch" placeholder="Search inbox">
      </div>
    </div>

    <div class="conversation-list" id="conversationList">
      <p style="padding:20px;">Loading conversations...</p>
    </div>
  </aside>

  <main class="main-panel">

    <div class="main-header">
      <div class="main-header-left">
        <div class="main-avatar"></div>
        <div>
          <div class="main-name" id="activeName">Select a conversation</div>
          <div class="main-subtitle" id="activeSubtitle">Your messages will appear here.</div>
        </div>
      </div>
    </div>

    <div class="message-thread" id="messageThread">
      <div class="app-card">
        Select a message from the left to view the conversation.
      </div>
    </div>

    <div class="message-composer">
      <textarea id="replyBox" placeholder="Write a message..." disabled></textarea>

      <div class="composer-actions">
        <button class="send-button" id="sendButton" disabled>
          Send Message
        </button>
      </div>
    </div>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://zvoarlanqjlezqzmgwhe.supabase.co",
  "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
);

let currentUserId = null;
let vendorId = null;
let inquiries = [];
let activeInquiry = null;
let clientProfiles = {};
let repliesByInquiry = {};

const conversationList = document.getElementById("conversationList");
const messageThread = document.getElementById("messageThread");
const activeName = document.getElementById("activeName");
const activeSubtitle = document.getElementById("activeSubtitle");
const replyBox = document.getElementById("replyBox");
const sendButton = document.getElementById("sendButton");
const messageBadge = document.getElementById("messageBadge");

async function initMessages() {
  const {
    data: { user },
    error: userError
  } = await supabaseClient.auth.getUser();

  if (userError || !user) {
    window.location.href = "login.html";
    return;
  }

  currentUserId = user.id;

  const { data: vendor, error: vendorError } = await supabaseClient
    .from("vendors")
    .select("*")
    .eq("user_id", currentUserId)
    .single();

  if (vendorError || !vendor) {
    conversationList.innerHTML = "<p style='padding:20px;'>Vendor profile not found.</p>";
    return;
  }

  vendorId = vendor.id;

  await loadInquiries();
}

async function loadInquiries() {
  const { data, error } = await supabaseClient
    .from("vendor_inquiries")
    .select("*")
    .eq("vendor_id", vendorId)
    .eq("vendor_deleted", false)
    .order("created_at", { ascending: false });

  if (error) {
    conversationList.innerHTML = "<p style='padding:20px;'>Could not load messages: " + error.message + "</p>";
    return;
  }

  inquiries = data || [];

  await loadClientProfiles();
  await loadRepliesForInquiries();

  sortInquiriesByLatestMessage();
  renderConversationList(inquiries);
  updateUnreadBadge();
}

async function loadClientProfiles() {
  clientProfiles = {};

  const clientUserIds = inquiries
    .map(inquiry => inquiry.client_user_id)
    .filter(Boolean);

  if (clientUserIds.length === 0) return;

  const { data: profiles } = await supabaseClient
    .from("client_profiles")
    .select("user_id, full_name, profile_image")
    .in("user_id", clientUserIds);

  if (profiles) {
    profiles.forEach(profile => {
      clientProfiles[profile.user_id] = profile;
    });
  }
}

async function loadRepliesForInquiries() {
  repliesByInquiry = {};

  const inquiryIds = inquiries.map(inquiry => inquiry.id);

  if (inquiryIds.length === 0) return;

  const { data: replies } = await supabaseClient
    .from("inquiry_replies")
    .select("*")
    .in("inquiry_id", inquiryIds)
    .order("created_at", { ascending: true });

  if (replies) {
    replies.forEach(reply => {
      if (!repliesByInquiry[reply.inquiry_id]) {
        repliesByInquiry[reply.inquiry_id] = [];
      }

      repliesByInquiry[reply.inquiry_id].push(reply);
    });
  }
}

function getLatestMessage(inquiry) {
  const replies = repliesByInquiry[inquiry.id] || [];

  if (replies.length > 0) {
    const latestReply = replies[replies.length - 1];

    return {
      text: latestReply.message || "",
      created_at: latestReply.created_at,
      sender_type: latestReply.sender_type,
      read_by_vendor: latestReply.read_by_vendor
    };
  }

  return {
    text: inquiry.message || "",
    created_at: inquiry.created_at,
    sender_type: "client",
    read_by_vendor: inquiry.status !== "new"
  };
}

function sortInquiriesByLatestMessage() {
  inquiries.sort((a, b) => {
    const latestA = new Date(getLatestMessage(a).created_at);
    const latestB = new Date(getLatestMessage(b).created_at);

    return latestB - latestA;
  });
}

function hasUnreadForVendor(inquiry) {
  if (inquiry.status === "new") return true;

  const replies = repliesByInquiry[inquiry.id] || [];

  return replies.some(reply =>
    reply.sender_type === "client" &&
    reply.read_by_vendor === false
  );
}

function updateUnreadBadge() {
  const unreadCount = inquiries.filter(inquiry => hasUnreadForVendor(inquiry)).length;

  if (unreadCount > 0) {
    messageBadge.style.display = "inline-block";
    messageBadge.textContent = unreadCount;
  } else {
    messageBadge.style.display = "none";
  }
}

function renderConversationList(list) {
  conversationList.innerHTML = "";

  if (!list.length) {
    conversationList.innerHTML = "<p style='padding:20px;'>No messages yet.</p>";
    return;
  }

  list.forEach(inquiry => {
    const isActive = activeInquiry && activeInquiry.id === inquiry.id;
    const isUnread = hasUnreadForVendor(inquiry);
    const latest = getLatestMessage(inquiry);
    const time = formatTime(latest.created_at);
    const clientProfile = clientProfiles[inquiry.client_user_id];
    const clientImage = clientProfile?.profile_image || "";

    conversationList.innerHTML += `
      <div class="conversation-item ${isActive ? "active" : ""}" onclick="openConversation('${inquiry.id}')">
        <div style="display:flex; gap:14px; width:100%;">
          <div class="conversation-avatar">
            ${clientImage ? `<img class="avatar-image" src="${clientImage}">` : ""}
          </div>

          <div class="conversation-content">
            <div class="conversation-top">
              <div class="conversation-name">
                ${isUnread ? "● " : ""}${inquiry.client_name || clientProfile?.full_name || "Unknown Client"}
              </div>
              <div class="conversation-time">${time}</div>
            </div>

            <div class="conversation-preview">
              ${latest.sender_type === "vendor" ? "You: " : ""}${latest.text || ""}
            </div>

            <button
              onclick="deleteConversation(event, '${inquiry.id}')"
              style="
                margin-top:10px;
                background:#b00020;
                color:white;
                border:none;
                border-radius:8px;
                padding:6px 10px;
                cursor:pointer;
                font-size:12px;
              ">
              Delete
            </button>
          </div>

          ${isUnread ? '<div class="unread-dot"></div>' : ''}
        </div>
      </div>
    `;
  });
}

async function openConversation(inquiryId) {
  activeInquiry = inquiries.find(i => i.id === inquiryId);

  if (!activeInquiry) return;

  const clientProfile = clientProfiles[activeInquiry.client_user_id];

  activeName.textContent =
    activeInquiry.client_name || clientProfile?.full_name || "Unknown Client";

  activeSubtitle.textContent =
    `${activeInquiry.event_type || "Inquiry"} • ${activeInquiry.client_email || ""}`;

  document.querySelector(".main-avatar").innerHTML =
    clientProfile?.profile_image
      ? `<img class="avatar-image" src="${clientProfile.profile_image}">`
      : "";

  replyBox.disabled = false;
  sendButton.disabled = false;

  await markInquiryAndClientRepliesRead(activeInquiry.id);
  await loadInquiries();

  activeInquiry = inquiries.find(i => i.id === inquiryId);

  if (activeInquiry) {
    await loadConversationThread(activeInquiry);
    renderConversationList(inquiries);
  }
}

async function markInquiryAndClientRepliesRead(inquiryId) {
  await supabaseClient
    .from("vendor_inquiries")
    .update({ status: "read" })
    .eq("id", inquiryId)
    .eq("vendor_id", vendorId);

  await supabaseClient
    .from("inquiry_replies")
    .update({ read_by_vendor: true })
    .eq("inquiry_id", inquiryId)
    .eq("sender_type", "client")
    .eq("read_by_vendor", false);
}

async function loadConversationThread(inquiry) {
  messageThread.innerHTML = "";

  messageThread.innerHTML += `
    <div class="message-bubble client">
      ${inquiry.message || ""}
      <div class="message-time">
        ${inquiry.client_name || "Client"} • ${new Date(inquiry.created_at).toLocaleString()}
      </div>
    </div>
  `;

  const replies = repliesByInquiry[inquiry.id] || [];

  replies.forEach(reply => {
    const bubbleClass = reply.sender_type === "vendor" ? "vendor" : "client";
    const senderLabel = reply.sender_type === "vendor" ? "You" : "Client";

    messageThread.innerHTML += `
      <div class="message-bubble ${bubbleClass}">
        ${reply.message || ""}
        <div class="message-time">
          ${senderLabel} • ${new Date(reply.created_at).toLocaleString()}
        </div>
      </div>
    `;
  });

  messageThread.scrollTop = messageThread.scrollHeight;
}

sendButton.addEventListener("click", async function() {
  if (!activeInquiry) return;

  const text = replyBox.value.trim();

  if (!text) return;

  const { error } = await supabaseClient
    .from("inquiry_replies")
    .insert([
      {
        inquiry_id: activeInquiry.id,
        sender_type: "vendor",
        message: text,
        read_by_client: false,
        read_by_vendor: true
      }
    ]);

  if (error) {
    alert("Reply could not be sent: " + error.message);
    return;
  }

  replyBox.value = "";

  await loadInquiries();
  activeInquiry = inquiries.find(i => i.id === activeInquiry.id);

  if (activeInquiry) {
    await loadConversationThread(activeInquiry);
    renderConversationList(inquiries);
  }
});

async function deleteConversation(event, inquiryId) {
  event.stopPropagation();

  const confirmed = confirm("Delete this conversation from your inbox?");
  if (!confirmed) return;

  const { error } = await supabaseClient
    .from("vendor_inquiries")
    .update({ vendor_deleted: true })
    .eq("id", inquiryId)
    .eq("vendor_id", vendorId);

  if (error) {
    alert("Could not delete conversation: " + error.message);
    return;
  }

  if (activeInquiry && activeInquiry.id === inquiryId) {
    activeInquiry = null;
    activeName.textContent = "Select a conversation";
    activeSubtitle.textContent = "Your messages will appear here.";
    document.querySelector(".main-avatar").innerHTML = "";

    messageThread.innerHTML = `
      <div class="app-card">
        Select a message from the left to view the conversation.
      </div>
    `;

    replyBox.disabled = true;
    sendButton.disabled = true;
    replyBox.value = "";
  }

  await loadInquiries();
}

document.getElementById("sidebarSearch").addEventListener("input", function() {
  filterConversations(this.value);
});

document.getElementById("searchInput").addEventListener("input", function() {
  filterConversations(this.value);
});

function filterConversations(searchValue) {
  const search = searchValue.toLowerCase();

  const filtered = inquiries.filter(inquiry => {
    const clientProfile = clientProfiles[inquiry.client_user_id];
    const latest = getLatestMessage(inquiry);

    return (
      (inquiry.client_name || "").toLowerCase().includes(search) ||
      (clientProfile?.full_name || "").toLowerCase().includes(search) ||
      (inquiry.client_email || "").toLowerCase().includes(search) ||
      (latest.text || "").toLowerCase().includes(search) ||
      (inquiry.event_type || "").toLowerCase().includes(search)
    );
  });

  renderConversationList(filtered);
}

document.getElementById("logoutLink").addEventListener("click", async function(event) {
  event.preventDefault();
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
});

function formatTime(dateString) {
  const date = new Date(dateString);
  const now = new Date();
  const diffMs = now - date;
  const diffMinutes = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMinutes / 60);

  if (diffMinutes < 1) return "now";
  if (diffMinutes < 60) return diffMinutes + "m";
  if (diffHours < 24) return diffHours + "h";

  return date.toLocaleDateString();
}

initMessages();
</script>

</body>
</html>
