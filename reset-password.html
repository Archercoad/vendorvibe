<!DOCTYPE html>
<html>
<head>
  <title>Reset Password | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .container {
      max-width: 450px;
      margin: 80px auto;
      background: white;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      border: 1px solid #b9d8de;
    }

    button {
      background-color: #1A0C6A;
      color: white;
      border: none;
      cursor: pointer;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }

    a {
      color: #1A0C6A;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Reset Password</h1>
    <p>Enter your new password below.</p>

    <input type="password" id="newPassword" placeholder="New password">

    <button id="resetButton">Update Password</button>

    <p class="message" id="message"></p>

    <p><a href="login.html">Back to Login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://zvoarlanqjlezqzmgwhe.supabase.co",
      "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
    );

    const message = document.getElementById("message");

    document.getElementById("resetButton").addEventListener("click", async function() {
      const newPassword = document.getElementById("newPassword").value;

      if (!newPassword) {
        message.textContent = "Please enter a new password.";
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (error) {
        message.textContent = "Password reset failed: " + error.message;
        return;
      }

      message.textContent = "Password updated successfully. You can now log in.";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    });
  </script>

</body>
</html>
