<!DOCTYPE html>
<html>
<head>
  <title>Vendor Sign Up | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: #EBFCFF;
      border-bottom: 1px solid #d9eef2;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #1A0C6A;
    }

    .page-header {
      text-align: center;
      padding: 50px 20px 20px;
    }

    .form-section {
      display: flex;
      justify-content: center;
      padding: 30px 20px 80px;
    }

    .signup-form {
      background-color: white;
      width: 100%;
      max-width: 600px;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .signup-form label {
      display: block;
      margin-top: 20px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .signup-form input,
    .signup-form select,
    .signup-form textarea {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .submit-button {
      margin-top: 25px;
      padding: 15px;
      background-color: #1A0C6A;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .success-message,
    .error-message {
      display: none;
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .success-message {
      background: #e6fffa;
      border: 2px solid #1A0C6A;
    }

    .error-message {
      background: #ffe6e6;
      border: 2px solid red;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <div class="logo">VendorVibe</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="vendors.html">Find Vendors</a>
    <a href="signup.html">For Vendors</a>
  </div>
</nav>

<section class="page-header">
  <h1>Join VendorVibe</h1>
</section>

<section class="form-section">
  <div>
    <form class="signup-form" id="signupForm">

      <label>Business Name</label>
      <input type="text" id="business-name" required>

      <label>Category</label>
      <select id="category" required>
        <option value="">Select</option>
        <option>Event Planning</option>
        <option>Photography</option>
        <option>Catering</option>
        <option>Entertainment</option>
        <option>Production</option>
        <option>Corporate Events</option>
      </select>

      <label>City</label>
      <input type="text" id="city">

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Description</label>
      <textarea id="description"></textarea>

      <button type="submit" class="submit-button">Submit</button>
    </form>

    <div class="success-message" id="successMessage">
      Submitted successfully
    </div>

    <div class="error-message" id="errorMessage">
      Something went wrong
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://zvoarlanqjlezqzmgwhe.supabase.co",
  "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
);

document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("business-name").value;
  const category = document.getElementById("category").value;
  const city = document.getElementById("city").value;
  const email = document.getElementById("email").value;
  const description = document.getElementById("description").value;

  const { data, error } = await supabaseClient
    .from("vendors")
    .insert([{
      name,
      category,
      city,
      email,
      description,
      image: "",
      status: "pending"
    }]);

  if (error) {
  console.log("Supabase insert error:", error);
  document.getElementById("errorMessage").style.display = "block";
  return;
}

document.getElementById("successMessage").style.display = "block";
document.getElementById("signupForm").reset();
});
</script>

</body>
</html>
