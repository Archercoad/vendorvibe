<!DOCTYPE html>
<html>
<head>
  <title>Login | VendorVibe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #EBFCFF;
      color: #1A0C6A;
    }

    .container {
      max-width: 480px;
      margin: 80px auto;
      background: white;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      border: 1px solid #b9d8de;
    }

    button {
      background-color: #1A0C6A;
      color: white;
      border: none;
      cursor: pointer;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }

    .signup-links {
      margin-top: 25px;
      display: grid;
      gap: 10px;
    }

    .signup-link {
      display: block;
      padding: 12px;
      border: 1px solid #1A0C6A;
      border-radius: 8px;
      text-align: center;
      color: #1A0C6A;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-link:hover {
      background-color: #EBFCFF;
    }

    a {
      color: #1A0C6A;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>VendorVibe Login</h1>

  <p>Login to your VendorVibe account.</p>

  <input type="email" id="email" placeholder="Email address">

  <input type="password" id="password" placeholder="Password">

  <button id="loginButton">Login</button>

  <p class="message" id="message"></p>

  <div class="signup-links">
    <a href="client-signup.html" class="signup-link">Create Client Account</a>
    <a href="signup.html" class="signup-link">Create Vendor Account</a>
  </div>

  <p style="text-align:center; margin-top:20px;">
    <a href="forgot-password.html">Forgot Password?</a>
  </p>

  <p style="text-align:center;">
    <a href="index.html">Back to Home</a>
  </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://zvoarlanqjlezqzmgwhe.supabase.co",
  "sb_publishable_8p6mMcu2YImc5doJhMpIaA_oA1yBYu9"
);

const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");

document.getElementById("loginButton").addEventListener("click", async function() {

  message.textContent = "";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) {
    message.textContent = "Login error: " + error.message;
    return;
  }

  const user = data.user;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (profile && profile.is_admin === true) {
    message.textContent = "Admin login successful!";

    setTimeout(() => {
      window.location.href = "admin-dashboard.html";
    }, 800);

    return;
  }

  const { data: vendor } = await supabaseClient
    .from("vendors")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (vendor) {
    message.textContent = "Vendor login successful!";

    setTimeout(() => {
      window.location.href = "vendor-dashboard.html";
    }, 800);

    return;
  }

  const { data: client } = await supabaseClient
    .from("client_profiles")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (client) {
    message.textContent = "Client login successful!";

    setTimeout(() => {
      window.location.href = "client-dashboard.html";
    }, 800);

    return;
  }

  message.textContent = "Login successful, but no account profile was found.";
});
</script>

</body>
</html>
